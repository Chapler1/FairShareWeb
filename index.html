<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FairShare</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #09061a;
        --card: rgba(255,255,255,0.04);
        --card-border: rgba(255,255,255,0.08);
        --row: rgba(255,255,255,0.04);
        --row-border: rgba(255,255,255,0.07);
        --purple: #7c3aed;
        --purple-light: #a78bfa;
        --purple-dim: rgba(139,92,246,0.25);
        --purple-border: rgba(139,92,246,0.35);
        --text: #ffffff;
        --text-muted: rgba(255,255,255,0.45);
        --label: rgba(196,181,253,0.45);
      }

      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 36px 16px 48px;
        color: var(--text);
        /* Subtle radial glow in background */
        background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124,58,237,0.18) 0%, transparent 70%);
      }

      .app {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      /* ── Header ── */
      .header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        margin-bottom: 18px;
      }

      .logo-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: linear-gradient(145deg, #7c3aed, #a855f7);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 16px rgba(124,58,237,0.4);
        flex-shrink: 0;
      }

      h1 {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: #fff;
      }

      .date {
        font-size: 0.8125rem;
        color: var(--label);
        font-weight: 400;
      }

      /* ── Card ── */
      .card {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 24px;
        padding: 20px;
        backdrop-filter: blur(20px);
      }

      .section-label {
        font-size: 0.6875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--label);
        margin-bottom: 14px;
      }

      /* ── People list ── */
      #people-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 14px;
      }

      .person-row {
        background: var(--row);
        border: 1px solid var(--row-border);
        border-radius: 16px;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: background 0.15s;
      }

      .person-row:hover { background: rgba(255,255,255,0.07); }

      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6d28d9, #a855f7);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8125rem;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
        user-select: none;
      }

      .person-name {
        font-size: 0.9375rem;
        font-weight: 500;
        color: var(--text);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .amount-input {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
        color: #fff;
        text-align: right;
        width: 7rem;
        padding: 7px 10px;
        border-radius: 10px;
        font-size: 0.875rem;
        font-family: inherit;
        flex-shrink: 0;
        transition: border-color 0.15s, background 0.15s;
        -webkit-appearance: none;
      }

      .amount-input:focus {
        outline: none;
        border-color: rgba(139,92,246,0.55);
        background: rgba(139,92,246,0.1);
      }

      .amount-input::placeholder { color: rgba(255,255,255,0.22); }

      .remove-btn {
        background: none;
        border: none;
        color: rgba(255,255,255,0.2);
        font-size: 1.375rem;
        line-height: 1;
        cursor: pointer;
        padding: 4px 2px;
        flex-shrink: 0;
        transition: color 0.15s;
        font-family: inherit;
      }

      .remove-btn:hover { color: rgba(252,165,165,0.8); }

      /* ── Add person row ── */
      .add-row {
        display: flex;
        gap: 10px;
      }

      #nameInput {
        flex: 1;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        color: #fff;
        border-radius: 14px;
        padding: 13px 16px;
        font-size: 0.9375rem;
        font-family: inherit;
        transition: border-color 0.15s, background 0.15s;
        -webkit-appearance: none;
      }

      #nameInput:focus {
        outline: none;
        border-color: rgba(139,92,246,0.5);
        background: rgba(139,92,246,0.07);
      }

      #nameInput::placeholder { color: rgba(255,255,255,0.25); }

      .add-btn {
        background: var(--purple-dim);
        border: 1px solid var(--purple-border);
        color: var(--purple-light);
        font-weight: 600;
        font-size: 0.9375rem;
        padding: 13px 20px;
        border-radius: 14px;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.15s, border-color 0.15s;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .add-btn:hover {
        background: rgba(139,92,246,0.38);
        border-color: rgba(139,92,246,0.55);
      }

      .add-btn:active { background: rgba(139,92,246,0.5); }

      /* ── Calculate button ── */
      .calc-btn {
        background: linear-gradient(135deg, #7c3aed 0%, #9333ea 100%);
        color: #fff;
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: 0.01em;
        padding: 17px;
        border-radius: 18px;
        width: 100%;
        border: none;
        cursor: pointer;
        font-family: inherit;
        box-shadow: 0 8px 28px rgba(124,58,237,0.38);
        transition: opacity 0.15s, transform 0.1s;
      }

      .calc-btn:hover { opacity: 0.9; }
      .calc-btn:active { transform: scale(0.99); opacity: 0.95; }

      /* ── Results ── */
      #results { display: none; }
      #results.visible { display: block; }

      .result-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 13px 0;
        border-bottom: 1px solid rgba(255,255,255,0.07);
      }

      .result-row:first-child { padding-top: 0; }
      .result-row:last-child { border-bottom: none; padding-bottom: 0; }

      .result-name.payer {
        font-size: 0.9375rem;
        font-weight: 500;
        color: var(--text);
        flex-shrink: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
        max-width: 36%;
      }

      /* Stretchy arrow line with arrowhead */
      .result-arrow {
        flex: 1;
        display: flex;
        align-items: center;
        min-width: 24px;
      }

      .result-arrow::before {
        content: '';
        flex: 1;
        height: 1.5px;
        background: rgba(167,139,250,0.7);
      }

      .result-arrow::after {
        content: '';
        width: 0;
        height: 0;
        border-top: 5px solid transparent;
        border-bottom: 5px solid transparent;
        border-left: 7px solid rgba(167,139,250,0.7);
      }

      .result-name.receiver {
        font-size: 0.9375rem;
        font-weight: 500;
        color: rgba(255,255,255,0.65);
        flex-shrink: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
        max-width: 36%;
      }

      .amount-badge {
        background: rgba(109,40,217,0.22);
        border: 1px solid rgba(139,92,246,0.3);
        color: #c4b5fd;
        font-weight: 700;
        font-size: 0.875rem;
        padding: 5px 11px;
        border-radius: 9px;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .balanced-msg {
        font-size: 0.9375rem;
        color: var(--text-muted);
        text-align: center;
        padding: 8px 0;
      }

      .results-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .results-header .section-label { margin-bottom: 0; }

      .copy-btn {
        background: var(--purple-dim);
        border: 1px solid var(--purple-border);
        color: var(--purple-light);
        font-family: inherit;
        font-size: 0.8125rem;
        font-weight: 600;
        padding: 5px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }

      .copy-btn:hover { background: rgba(139,92,246,0.38); }
      .copy-btn.copied { background: rgba(34,197,94,0.18); border-color: rgba(34,197,94,0.4); color: #86efac; }

      /* ── Number input spinners ── */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    </style>

    <script defer>
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("current-date").textContent =
          new Date().toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
      });
    </script>

    <script src="script.js" defer></script>
  </head>

  <body>
    <div class="app">

      <!-- Header -->
      <div class="header">
        <div class="logo-row">
          <div class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
            </svg>
          </div>
          <h1>FairShare</h1>
        </div>
        <span id="current-date" class="date"></span>
      </div>

      <!-- Participants card -->
      <div class="card">
        <p class="section-label">Participants</p>
        <div id="people-list"></div>
        <div class="add-row">
          <input id="nameInput" type="text" placeholder="Add a person…"
            onkeydown="if(event.key==='Enter') addPerson()" />
          <button class="add-btn" onclick="addPerson()">Add</button>
        </div>
      </div>

      <!-- Calculate -->
      <button class="calc-btn" onclick="calculate()">Calculate</button>

      <!-- Results -->
      <div id="results" class="card">
        <div class="results-header">
          <p class="section-label">Settlements</p>
          <button class="copy-btn" id="copy-btn" onclick="copyResults()">Copy</button>
        </div>
        <div id="results-content"></div>
      </div>

    </div>
  </body>
</html>
